<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Assignment</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            min-height: 100vh;
        }
        .university-header {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .university-header h1 {
            margin: 0;
            font-size: 28px;
        }
        .university-header p {
            margin: 5px 0;
            font-size: 16px;
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .logout-btn {
            float: right;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s ease;
        }
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .card h2 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }
        input[type=text], input[type=date], input[type=number], select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
            transition: border-color 0.3s ease;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        button.submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button.submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            margin: 40px 0;
        }
        .filter-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .filter-group label {
            font-weight: 600;
            color: #34495e;
        }
        input[type=radio] {
            margin-right: 8px;
        }
        #assignmentList {
            margin-top: 20px;
        }
        #assignmentList li {
            background: #f8f9fa;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            list-style: disc inside;
            border-left: 5px solid #667eea;
        }
    </style>
</head>
<body>
    <div class="university-header">
        <h1>FORTPORTAL SECONDARY SCHOOL</h1>
        <p>The Fear of The Lord is The Beginning of Wisdom </p>
        <p>SCHOOL ASSIGNMENT MANAGEMENT SYSTEM</p>
    </div>

    <div class="container">
        <a href="logout.php" class="logout-btn">Logout</a>
        <div class="card">
            <h2>Assignment Submission Form</h2>
            <form id="assignmentForm" action="save_assignment.php" method="POST">

                <!-- Student Name -->
                <label>Student Name:</label>
                <input type="text" id="student_name" name="student_name">
                <span class="error" id="nameError"></span>

                <!-- Student ID -->
                <label>Student ID:</label>
                <input type="text" id="student_id" name="student_id">
                <span class="error" id="idError"></span>

                <!-- Subject -->
                <label>Subject:</label>
                <select id="subject" name="subject">
                    <option value="">--Select Subject--</option>
                    <option>Mathematics</option>
                    <option>English</option>
                    <option>Science</option>
                    <option>History</option>
                    <option>Biology</option>
                    <option>Physics</option>
                    <option>Computer Science</option>
                </select>
                <span class="error" id="subjectError"></span>

                <!-- Assignment Title -->
                <label>Assignment Title:</label>
                <input type="text" id="assignment_title" name="assignment_title">
                <span class="error" id="titleError"></span>

                <!-- Due Date -->
                <label>Due Date:</label>
                <input type="date" id="due_date" name="due_date">
                <span class="error" id="dateError"></span>

                <!-- Marks -->
                <label>Marks Obtained:</label>
                <input type="number" id="marks" name="marks" min="0" max="100">
                <span class="error" id="marksError"></span>

                <!-- Remarks -->
                <label>Remarks:</label>
                <textarea id="remarks" name="remarks"></textarea>

                <button type="submit" class="submit-btn">Submit Assignment</button>

            </form>
        </div>

        <div class="card">
            <h2>Sample Assignment Filter</h2>
            <p>Choose a subject to see sample assignments below.</p>
            <div class="filter-group">
                <label><input type="radio" name="filter" value="all" checked onclick="filterAssignments()"> Show All</label>
                <label><input type="radio" name="filter" value="Mathematics" onclick="filterAssignments()"> Mathematics</label>
                <label><input type="radio" name="filter" value="Science" onclick="filterAssignments()"> Science</label>
            </div>
            <ul id="assignmentList"></ul>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
